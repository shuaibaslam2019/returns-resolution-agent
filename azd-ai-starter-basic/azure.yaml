# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: returns-agent
services:
    returns-resolution-agent:
        project: .
        host: azure.ai.agent
        language: docker
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4.1
                    version: "2025-04-14"
                  name: gpt-4.1
                  sku:
                    capacity: 500
                    name: GlobalStandard
            startupCommand: python orchestrator.py
infra:
    provider: bicep
    path: ./infra
